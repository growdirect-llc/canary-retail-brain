name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: vault

      - name: Clone Quartz
        run: git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git quartz

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Copy vault content
        run: |
          rsync -av \
            --exclude='.obsidian' \
            --exclude='.github' \
            --exclude='quartz' \
            --exclude='quartz.config.ts' \
            --exclude='quartz.layout.ts' \
            --exclude='static' \
            --exclude='README.md' \
            --exclude='ACKNOWLEDGMENT.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='NOTICE.md' \
            --exclude='SECURITY.md' \
            --exclude='ready-to-show-confirmation.md' \
            vault/ quartz/content/
          if [ -f quartz/content/Home.md ]; then
            mv quartz/content/Home.md quartz/content/index.md
          fi

      - name: Overlay Quartz customizations
        run: |
          cp vault/quartz.config.ts quartz/quartz.config.ts
          cp vault/quartz.layout.ts quartz/quartz.layout.ts
          if [ -d vault/quartz/styles ]; then
            cp -r vault/quartz/styles/. quartz/quartz/styles/
          fi
          if [ -d vault/static ]; then
            mkdir -p quartz/quartz/static
            cp -r vault/static/. quartz/quartz/static/
          fi

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Write CNAME
        run: echo "crb.growdirect.io" > quartz/public/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
